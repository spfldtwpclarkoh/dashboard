<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohio Traffic Cameras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        
        /* Loading spinner animation */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: #38bdf8; /* Sky 400 */
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-black text-slate-200 h-screen w-screen overflow-hidden">

    <main id="camera-container" class="grid grid-cols-2 grid-rows-2 h-full w-full gap-1 p-1 bg-black">
        
        <div id="loading" class="col-span-2 row-span-2 flex items-center justify-center text-slate-400">
            <div class="flex flex-col items-center gap-4">
                <div class="spinner"></div>
                <p class="text-lg animate-pulse">Initializing camera feeds...</p>
            </div>
        </div>

        <div id="error" class="hidden col-span-2 row-span-2 flex items-center justify-center">
            <div class="text-center text-red-300 bg-red-900/50 border border-red-700 p-6 rounded-lg max-w-lg">
                <p>Could not fetch camera data. Please check the console for more details.</p>
            </div>
        </div>

    </main>

    <script>
        const cameraContainer = document.getElementById('camera-container');
        const loadingIndicator = document.getElementById('loading');
        const errorIndicator = document.getElementById('error');
        
        // Configuration
        const bearerToken = '2bd6a482-97de-478e-812d-50b245075206';
        
        // API URL to fetch the 4 specific cameras
        const apiUrl = `https://publicapi.ohgo.com/api/v1/cameras/00000000000182%2C00000000000371%2C00000000000424%2C00000000001202?page-size=4&page-all=all`;
        
        // Update frequency in milliseconds
        const REFRESH_RATE = 2000; 

        let activeCameras = [];

        // 1. Initialize: Fetch camera metadata and build DOM structure ONCE
        async function initCameras() {
            try {
                errorIndicator.classList.add('hidden');
                
                const response = await fetch(apiUrl, {
                    headers: {
                        'accept': 'application/json',
                        'Authorization': `Bearer ${bearerToken}`
                    }
                });

                if (!response.ok) {
                    let errorText = `API request failed with status ${response.status}: ${response.statusText}.`;
                    if (response.status === 401 || response.status === 403) {
                        errorText += " Token invalid/expired.";
                    }
                    throw new Error(errorText);
                }

                const result = await response.json();
                const cameras = result.results;

                if (loadingIndicator) loadingIndicator.style.display = 'none';

                if (cameras && cameras.length > 0) {
                    // Filter for valid cameras only
                    activeCameras = cameras.filter(camera => 
                        camera.cameraViews && 
                        camera.cameraViews.length > 0 && 
                        camera.cameraViews[0].largeUrl
                    );

                    if (activeCameras.length === 0) {
                        showNoDataMessage();
                        return;
                    }

                    // Build the DOM elements for each camera
                    activeCameras.forEach(camera => {
                        const cameraView = camera.cameraViews[0];
                        const baseImageUrl = cameraView.largeUrl;
                        
                        const cameraCard = document.createElement('div');
                        // Make each cell relative to contain the absolute positioned overlay and image
                        cameraCard.className = 'relative bg-slate-900 rounded overflow-hidden border border-slate-800 flex items-center justify-center w-full h-full';
                        
                        cameraCard.innerHTML = `
                            <div class="absolute top-0 left-0 right-0 p-2 md:p-3 bg-gradient-to-b from-black/90 via-black/50 to-transparent z-20 flex justify-between items-start pointer-events-none">
                                <h2 class="font-semibold text-xs md:text-sm text-slate-100 truncate pr-2 drop-shadow-md" title="${camera.description}">
                                    ${camera.description}
                                </h2>
                                <span class="text-[10px] md:text-xs text-sky-400 font-mono px-1.5 py-0.5 bg-black/60 backdrop-blur-sm rounded border border-sky-900/50">LIVE</span>
                            </div>
                            
                            <div class="spinner absolute z-10"></div>
                            
                            <img 
                                id="img-${camera.id}" 
                                data-base-url="${baseImageUrl}" 
                                src="${baseImageUrl}?t=${Date.now()}" 
                                alt="${camera.description}" 
                                class="absolute inset-0 w-full h-full object-contain z-0 transition-opacity duration-300 opacity-0"
                                onerror="this.style.opacity='0'; this.parentElement.querySelector('.spinner').style.display='none';"
                                onload="this.style.opacity='1'; this.parentElement.querySelector('.spinner').style.display='none';"
                            >
                        `;
                        cameraContainer.appendChild(cameraCard);
                    });

                    // Start the rapid refresh loop
                    startLiveFeed();

                } else {
                    showNoDataMessage();
                }

            } catch (error) {
                console.error('Error initializing cameras:', error);
                if (loadingIndicator) loadingIndicator.style.display = 'none';
                errorIndicator.querySelector('p').textContent = error.message;
                errorIndicator.classList.remove('hidden');
                errorIndicator.style.display = 'flex';
            }
        }

        function showNoDataMessage() {
            const msg = document.createElement('div');
            msg.className = 'col-span-2 row-span-2 flex items-center justify-center text-slate-500 bg-slate-900 rounded';
            msg.innerHTML = '<p class="text-lg">No active camera feeds found.</p>';
            cameraContainer.appendChild(msg);
        }

        // 2. The Loop: Update only images
        function startLiveFeed() {
            setInterval(() => {
                activeCameras.forEach(camera => {
                    const imgElement = document.getElementById(`img-${camera.id}`);
                    if (imgElement) {
                        updateCameraImage(imgElement);
                    }
                });
            }, REFRESH_RATE);
        }

        // 3. Smooth Update: Preload image in background
        function updateCameraImage(imgElement) {
            const baseUrl = imgElement.getAttribute('data-base-url');
            const newSrc = `${baseUrl}?t=${Date.now()}`;
            
            const tempImage = new Image();
            tempImage.onload = () => {
                imgElement.src = newSrc;
            };
            tempImage.src = newSrc;
        }

        // Start everything
        initCameras();

    </script>
</body>
</html>
