<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Springfield, OH - Active Weather Radar</title>
    
    <!-- Tailwind CSS for UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS for Mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        /* Ensure the map takes up the full screen behind the UI */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        /* Position the control panel over the map */
        #radar-controls {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        /* Add smooth fading to the radar map layers */
        .radar-layer {
            transition: opacity 0.4s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-900 font-sans">

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Floating Info Panel (View Only) -->
    <div id="radar-controls" class="w-auto min-w-[250px] bg-gray-900/80 backdrop-blur-md border border-gray-700 rounded-2xl px-6 py-4 shadow-2xl flex flex-col items-center justify-center transition-all">
        <h2 class="text-gray-100 font-semibold text-xl tracking-wide">Springfield, OH Radar</h2>
        <span id="timestamp" class="text-blue-400 text-base font-medium font-mono mt-1">Loading data...</span>
    </div>

    <script>
        // 1. Initialize Map centered on Springfield, Ohio (View Only mode)
        const SPRINGFIELD_COORDS = [39.9242, -83.8088];
        const map = L.map('map', {
            zoomControl: false,
            dragging: false,
            touchZoom: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            boxZoom: false,
            keyboard: false
        }).setView(SPRINGFIELD_COORDS, 11.25);

        // 2. Set up Base Map (Esri Topographic)
        const topoMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri',
            maxZoom: 19,
            maxNativeZoom: 18 // Prevents missing tile errors at very high zooms
        }).addTo(map);

        // 3. Radar Application State Variables
        let radarFrames = [];
        let radarLayers = {};
        let currentFrame = 0;

        // DOM Elements
        const timestampDisplay = document.getElementById('timestamp');

        // 4. Fetch and setup RainViewer Radar Data
        async function fetchRadarData() {
            try {
                // RainViewer public API provides metadata for their radar tiles
                const response = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await response.json();
                
                // Combine recent past and near-future (nowcast) data arrays safely
                const past = data.radar.past || [];
                const nowcast = data.radar.nowcast || [];
                
                // Store the full objects (which include 'time' and the new dynamic 'path')
                radarFrames = [...past, ...nowcast];
                
                // Start by showing the most recent actual radar reading (before any forecasts)
                currentFrame = past.length > 0 ? past.length - 1 : 0; 

                // Preload tile layers to prevent flickering during playback
                radarFrames.forEach(frame => {
                    // Critical Update: Use data.host and frame.path instead of raw timestamps
                    const url = `${data.host}${frame.path}/256/{z}/{x}/{y}/4/1_1.png`;
                    const layer = L.tileLayer(url, {
                        opacity: 0, // Keep invisible until it's the active frame
                        zIndex: 10,
                        className: 'radar-layer',
                        maxNativeZoom: 7 // Rainviewer limits free zoom to 7. This scales it safely.
                    });
                    layer.addTo(map);
                    radarLayers[frame.time] = layer;
                });

                // Draw the initial map frame
                updateMapFrame();
                
                // Auto-start the time lapse once data is loaded
                playLoop();

            } catch (error) {
                console.error("Failed to load RainViewer radar data:", error);
                timestampDisplay.innerText = "Error loading radar data";
            }
        }

        // 5. Core update logic for changing frames
        function updateMapFrame() {
            if (radarFrames.length === 0) return;
            
            const activeFrame = radarFrames[currentFrame];
            const activeTime = activeFrame.time;
            
            // Hide all layers, then show only the current one
            radarFrames.forEach(f => radarLayers[f.time].setOpacity(0));
            radarLayers[activeTime].setOpacity(0.65); // 65% opacity allows base map to show through

            // Format the timestamp for display
            const date = new Date(activeTime * 1000);
            
            // Format to something like "Tue 2:30 PM"
            const formattedTime = date.toLocaleTimeString([], { 
                weekday: 'short', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            timestampDisplay.innerText = formattedTime;
        }

        // 6. Playback Animation Loop (Auto-playing)
        function playLoop() {
            currentFrame++;
            let delay = 400; // Default speed: 400ms per frame

            // If we reach the end, pause for a moment before looping back to the start
            if (currentFrame >= radarFrames.length) {
                currentFrame = 0; 
                delay = 1200; // 1.2 second pause at the end of the loop
            }

            updateMapFrame();
            setTimeout(playLoop, delay);
        }

        // 7. Fetch and draw Clark County boundary
        async function highlightClarkCounty() {
            try {
                // Fetch GeoJSON boundary from OpenStreetMap/Nominatim
                const response = await fetch('https://nominatim.openstreetmap.org/search?county=Clark&state=Ohio&country=USA&polygon_geojson=1&format=json');
                const data = await response.json();
                
                if (data && data.length > 0 && data[0].geojson) {
                    L.geoJSON(data[0].geojson, {
                        style: {
                            color: '#fbbf24', // Amber/Yellow outline
                            weight: 3,
                            opacity: 0.9,
                            fillColor: '#fbbf24',
                            fillOpacity: 0.05, // Very light fill
                            dashArray: '6, 8' // Dashed border
                        },
                        interactive: false // So it doesn't block clicks to the map underneath
                    }).addTo(map);
                }
            } catch (error) {
                console.error("Failed to load Clark County boundary:", error);
            }
        }

        // Boot the app
        fetchRadarData();
        highlightClarkCounty();

    </script>
</body>
</html>
