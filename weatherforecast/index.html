<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Springfield Weather Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            width: 100vw;
            color: white;
            transition: background 0.5s ease;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent all scrolling */
            user-select: none; /* Disable text selection for view-only feel */
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
        }

        /* Dynamic Backgrounds based on weather */
        body.weather-clear { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        body.weather-cloudy { background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 100%); color: #333; }
        body.weather-cloudy .glass-panel { background: rgba(0, 0, 0, 0.05); border-color: rgba(0,0,0,0.1); color: #111;}
        
        body.weather-rain { background: linear-gradient(135deg, #3a7bd5 0%, #3a6073 100%); }
        body.weather-snow { background: linear-gradient(135deg, #E0EAFC 0%, #CFDEF3 100%); color: #333; }
        body.weather-snow .glass-panel { background: rgba(0, 0, 0, 0.05); border-color: rgba(0,0,0,0.1); color: #111;}

        body.weather-night { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); color: white; }
        body.weather-night .glass-panel { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); color: white;}
    </style>
</head>
<body class="antialiased p-4 md:p-6 lg:p-8 weather-clear" id="app-body">

    <div class="w-full h-full flex flex-col space-y-4 max-w-[1600px] mx-auto">
        
        <!-- Header -->
        <header class="flex justify-between items-center px-2 flex-shrink-0">
            <div class="flex items-center gap-3">
                <i data-lucide="cloud-sun" class="w-8 h-8 md:w-10 md:h-10"></i>
                <h1 class="text-xl md:text-3xl font-bold tracking-tight">Springfield Weather</h1>
            </div>
            <div id="status-indicator" class="text-xs md:text-sm font-medium opacity-70 flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span>
                </span>
                Live Display
            </div>
        </header>

        <!-- Error Message -->
        <div id="error-message" class="hidden glass-panel bg-red-500/20 text-red-100 p-4 text-center">
            Failed to load weather data.
        </div>

        <!-- Main Weather Content -->
        <main id="weather-content" class="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-grow overflow-hidden transition-opacity duration-300">
            
            <!-- Current Weather Hero -->
            <div class="glass-panel lg:col-span-8 p-6 md:p-8 flex flex-col justify-between relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-10 transform scale-[2.5] translate-x-1/4 -translate-y-1/4 pointer-events-none" id="hero-bg-icon">
                </div>
                
                <div class="relative z-10">
                    <h2 id="city-name" class="text-3xl md:text-5xl lg:text-7xl font-bold mb-2">Springfield, OH</h2>
                    <p id="current-date" class="text-lg md:text-2xl opacity-80 font-light">Loading...</p>
                </div>

                <div class="relative z-10 flex flex-col md:flex-row items-start md:items-end justify-between gap-4">
                    <div class="flex items-center gap-6 lg:gap-10">
                        <div id="current-icon-container" class="w-24 h-24 md:w-32 md:h-32 lg:w-48 lg:h-48">
                            <!-- Dynamic Icon -->
                        </div>
                        <div>
                            <div class="flex items-start">
                                <span id="current-temp" class="text-7xl md:text-8xl lg:text-9xl font-bold tracking-tighter leading-none">--</span>
                                <span class="text-3xl md:text-4xl lg:text-5xl font-medium mt-2">°F</span>
                            </div>
                            <p id="current-desc" class="text-xl md:text-3xl font-medium capitalize mt-2">Loading...</p>
                        </div>
                    </div>
                    
                    <div class="flex flex-row md:flex-col gap-6 md:gap-2 text-left md:text-right w-full md:w-auto border-t md:border-t-0 border-white/10 pt-4 md:pt-0">
                        <p class="text-xl md:text-3xl font-medium">H: <span id="temp-high">--°</span></p>
                        <p class="text-xl md:text-3xl font-medium">L: <span id="temp-low">--°</span></p>
                        <p class="text-sm md:text-lg opacity-80">Feels like <span id="temp-feels">--°</span></p>
                    </div>
                </div>
            </div>

            <!-- Current Details Grid -->
            <div class="lg:col-span-4 grid grid-cols-2 lg:grid-cols-1 gap-4">
                <div class="glass-panel p-4 md:p-6 flex items-center gap-4">
                    <div class="bg-white/10 p-3 rounded-2xl">
                        <i data-lucide="wind" class="w-6 h-6 md:w-8 md:h-8"></i>
                    </div>
                    <div>
                        <p class="text-xs uppercase tracking-wider opacity-60">Wind</p>
                        <p id="wind-display" class="text-xl md:text-2xl font-bold">--</p>
                    </div>
                </div>

                <div class="glass-panel p-4 md:p-6 flex items-center gap-4">
                    <div class="bg-white/10 p-3 rounded-2xl">
                        <i data-lucide="droplets" class="w-6 h-6 md:w-8 md:h-8"></i>
                    </div>
                    <div>
                        <p class="text-xs uppercase tracking-wider opacity-60">Humidity</p>
                        <p class="text-xl md:text-2xl font-bold"><span id="detail-humidity">--</span>%</p>
                    </div>
                </div>

                <div class="glass-panel p-4 md:p-6 flex items-center gap-4">
                    <div class="bg-white/10 p-3 rounded-2xl">
                        <i data-lucide="sun" class="w-6 h-6 md:w-8 md:h-8"></i>
                    </div>
                    <div>
                        <p class="text-xs uppercase tracking-wider opacity-60">Max UV Index</p>
                        <p class="text-xl md:text-2xl font-bold" id="detail-uv">--</p>
                    </div>
                </div>

                <div class="glass-panel p-4 md:p-6 flex items-center gap-4">
                    <div class="bg-white/10 p-3 rounded-2xl">
                        <i data-lucide="cloud-rain" class="w-6 h-6 md:w-8 md:h-8"></i>
                    </div>
                    <div>
                        <p class="text-xs uppercase tracking-wider opacity-60">Precipitation</p>
                        <p class="text-xl md:text-2xl font-bold"><span id="detail-precip">--</span> <span class="text-sm font-normal">in</span></p>
                    </div>
                </div>
            </div>

            <!-- 7-Day Forecast -->
            <div class="glass-panel lg:col-span-12 p-6 flex flex-col">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-3 flex-shrink-0">
                    <i data-lucide="calendar-days" class="w-6 h-6 opacity-80"></i> 7-Day Forecast
                </h3>
                
                <div class="grid grid-cols-4 lg:grid-cols-7 gap-3 flex-grow" id="forecast-container">
                    <!-- Forecast items injected here via JS -->
                </div>
            </div>

        </main>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // DOM Elements
        const errorMsg = document.getElementById('error-message');
        const weatherContent = document.getElementById('weather-content');
        const appBody = document.getElementById('app-body');

        const weatherCodes = {
            0: { desc: 'Clear sky', icon: 'sun', theme: 'weather-clear' },
            1: { desc: 'Mainly clear', icon: 'sun', theme: 'weather-clear' },
            2: { desc: 'Partly cloudy', icon: 'cloud-sun', theme: 'weather-cloudy' },
            3: { desc: 'Overcast', icon: 'cloud', theme: 'weather-cloudy' },
            45: { desc: 'Fog', icon: 'cloud-fog', theme: 'weather-cloudy' },
            48: { desc: 'Fog', icon: 'cloud-fog', theme: 'weather-cloudy' },
            51: { desc: 'Light drizzle', icon: 'cloud-drizzle', theme: 'weather-rain' },
            53: { desc: 'Moderate drizzle', icon: 'cloud-drizzle', theme: 'weather-rain' },
            55: { desc: 'Dense drizzle', icon: 'cloud-drizzle', theme: 'weather-rain' },
            61: { desc: 'Slight rain', icon: 'cloud-rain', theme: 'weather-rain' },
            63: { desc: 'Moderate rain', icon: 'cloud-rain', theme: 'weather-rain' },
            65: { desc: 'Heavy rain', icon: 'cloud-rain', theme: 'weather-rain' },
            71: { desc: 'Slight snow', icon: 'snowflake', theme: 'weather-snow' },
            73: { desc: 'Moderate snow', icon: 'snowflake', theme: 'weather-snow' },
            75: { desc: 'Heavy snow', icon: 'snowflake', theme: 'weather-snow' },
            80: { desc: 'Slight rain showers', icon: 'cloud-rain', theme: 'weather-rain' },
            81: { desc: 'Moderate rain showers', icon: 'cloud-rain', theme: 'weather-rain' },
            82: { desc: 'Violent rain showers', icon: 'cloud-lightning', theme: 'weather-rain' },
            95: { desc: 'Thunderstorm', icon: 'cloud-lightning', theme: 'weather-rain' }
        };

        const formatDate = (dateString, options) => {
            const date = new Date(dateString + 'T00:00:00');
            return new Intl.DateTimeFormat('en-US', options).format(date);
        };

        // Helper to convert degree to compass direction
        const getWindDirection = (degree) => {
            const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            const index = Math.round(degree / 45) % 8;
            return directions[index];
        };

        async function getWeatherData(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,wind_speed_10m,wind_direction_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,uv_index_max&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto`;
            const res = await fetch(url);
            if (!res.ok) throw new Error("Failed to fetch weather data");
            return await res.json();
        }

        function updateUI(location, weather) {
            const current = weather.current;
            const daily = weather.daily;
            
            document.getElementById('city-name').textContent = `${location.name}, ${location.admin1}`;
            
            const now = new Date();
            document.getElementById('current-date').textContent = new Intl.DateTimeFormat('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).format(now);

            const codeInfo = weatherCodes[current.weather_code] || weatherCodes[0];
            let iconName = codeInfo.icon;
            
            if (current.is_day === 0) {
                if (iconName === 'sun') iconName = 'moon';
                if (iconName === 'cloud-sun') iconName = 'cloud-moon';
                appBody.className = `antialiased p-4 md:p-6 lg:p-8 weather-night`;
            } else {
                appBody.className = `antialiased p-4 md:p-6 lg:p-8 ${codeInfo.theme}`;
            }

            document.getElementById('current-temp').textContent = Math.round(current.temperature_2m);
            document.getElementById('current-desc').textContent = codeInfo.desc;
            document.getElementById('temp-feels').textContent = `${Math.round(current.apparent_temperature)}°`;
            
            const iconHtml = `<i data-lucide="${iconName}" class="w-full h-full text-current drop-shadow-xl"></i>`;
            document.getElementById('current-icon-container').innerHTML = iconHtml;
            document.getElementById('hero-bg-icon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full"></i>`;
            
            document.getElementById('temp-high').textContent = `${Math.round(daily.temperature_2m_max[0])}°`;
            document.getElementById('temp-low').textContent = `${Math.round(daily.temperature_2m_min[0])}°`;
            
            // Update Wind with Direction
            const windSpeed = Math.round(current.wind_speed_10m);
            const windDir = getWindDirection(current.wind_direction_10m);
            document.getElementById('wind-display').innerHTML = `${windSpeed} <span class="text-sm font-normal">mph</span> <span class="ml-1 text-base opacity-70">${windDir}</span>`;
            
            document.getElementById('detail-humidity').textContent = current.relative_humidity_2m;
            document.getElementById('detail-uv').textContent = Math.round(daily.uv_index_max[0]);
            document.getElementById('detail-precip').textContent = current.precipitation.toFixed(2);

            const forecastContainer = document.getElementById('forecast-container');
            forecastContainer.innerHTML = '';

            for (let i = 1; i < 8; i++) {
                if(i >= daily.time.length) continue; 
                
                const dayDate = daily.time[i];
                const dayCode = daily.weather_code[i];
                const dayMax = Math.round(daily.temperature_2m_max[i]);
                const dayMin = Math.round(daily.temperature_2m_min[i]);
                const dayInfo = weatherCodes[dayCode] || weatherCodes[0];
                const dayName = formatDate(dayDate, { weekday: 'short' });

                const dayCard = document.createElement('div');
                dayCard.className = 'glass-panel flex flex-col items-center justify-center p-3 text-center pointer-events-none';
                
                dayCard.innerHTML = `
                    <span class="text-xs font-semibold uppercase tracking-wider opacity-70 mb-2">${dayName}</span>
                    <i data-lucide="${dayInfo.icon}" class="w-8 h-8 md:w-10 md:h-10 mb-2"></i>
                    <div class="flex flex-col gap-0">
                        <span class="text-lg font-bold">${dayMax}°</span>
                        <span class="text-xs opacity-60">${dayMin}°</span>
                    </div>
                `;
                forecastContainer.appendChild(dayCard);
            }

            lucide.createIcons();
            weatherContent.classList.remove('opacity-0', 'invisible');
            errorMsg.classList.add('hidden');
        }

        async function loadSpringfieldWeather() {
            try {
                const location = {
                    lat: 39.9242,
                    lon: -83.8088,
                    name: "Springfield",
                    admin1: "OH",
                    country: "US"
                };
                const weather = await getWeatherData(location.lat, location.lon);
                updateUI(location, weather);
            } catch (error) {
                console.error(error);
                errorMsg.classList.remove('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', loadSpringfieldWeather);
        
        // Refresh weather data every 30 minutes for a live display
        setInterval(loadSpringfieldWeather, 1800000);
    </script>
</body>
</html>
