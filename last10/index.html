<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last 10 Runs</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        @keyframes floatUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .float-up-animation {
            opacity: 0; 
            animation: floatUp 0.5s ease-out forwards;
        }
    </style>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        // Restored Auth imports to clear permission errors
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCxer4UcW04LXNXZe3WdjTAi6C64P18VJE",
          authDomain: "spfld-twp-fire.firebaseapp.com",
          projectId: "spfld-twp-fire",
          storageBucket: "spfld-twp-fire.firebasestorage.app",
          messagingSenderId: "625097083856",
          appId: "1:625097083856:web:2703d29764be68eab6c7d5",
          measurementId: "G-5JDF2SZVGZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = 'default-app-id';

        let runsList, runsListContainer, loadingMessage, errorMessage, errorText;

        document.addEventListener('DOMContentLoaded', () => {
            runsList = document.getElementById('runs-list');
            runsListContainer = document.getElementById('runs-list-container');
            loadingMessage = document.getElementById('loading-message');
            errorMessage = document.getElementById('error-message');
            errorText = document.getElementById('error-text');
            
            // Initialize Auth session first
            initApp();
        });

        async function initApp() {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth error:", error);
                showError("Authentication failed.");
            }
        }

        // Listen for successful auth before attaching the Firestore listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                setupRealtimeListener();
            }
        });

        // Helper function to guarantee 24-hour time format
        function enforce24HourTime(timeStr) {
            if (!timeStr) return 'N/A';
            const match = timeStr.trim().match(/^(\d{1,2}):(\d{2})\s?(AM|PM|am|pm)?$/);
            if (!match) return timeStr; 
            
            let [ , hours, minutes, modifier ] = match;
            if (!modifier) return timeStr; 
            
            hours = parseInt(hours, 10);
            if (modifier.toUpperCase() === 'PM' && hours < 12) hours += 12;
            if (modifier.toUpperCase() === 'AM' && hours === 12) hours = 0;
            
            return `${hours.toString().padStart(2, '0')}:${minutes}`;
        }

        function setupRealtimeListener() {
            const callsRef = collection(db, 'artifacts', appId, 'public', 'data', 'calls');
            
            // Server-side optimized query mapping directly to indices
            const q = query(
                callsRef, 
                orderBy('year', 'desc'), 
                orderBy('sequence', 'desc'), 
                limit(10)
            );

            onSnapshot(q, (snapshot) => {
                const calls = [];
                snapshot.forEach((doc) => {
                    calls.push(doc.data());
                });

                if (calls.length === 0) {
                    loadingMessage.style.display = 'none';
                    showError("No calls found in database.");
                    return;
                }
                
                renderRuns(calls);

            }, (error) => {
                console.error("Firestore Error:", error);
                showError("Could not load data from database.");
            });
        }

        function renderRuns(data) {
            runsList.innerHTML = '';

            const emsNatures = [
                "FALL", "SICK", "RESP", "BACK", "PERUNCON", "ABDOM", 
                "CARDIAC", "BLEEDING", "SEIZURE", "STROKE", "TRAUMA", 
                "DEATH", "EXPOSURE", "ALRMED", "CHESPAIN", "ALRCO", 
                "DIABETIC", "HEADACHE", "OD", "SUICTHRT", "EDP", 
                "ASSAULT", "SUICIDE", "DISORD", "ALLERGIC", "DVA", 
                "WEAPON", "RESPARR"
            ];

            data.forEach((run, index) => {
                const card = document.createElement('div');
                card.className = 'bg-slate-800 p-3 rounded-lg shadow border border-slate-700 transition-colors duration-200 hover:bg-slate-700 float-up-animation';
                card.style.animationDelay = `${index * 0.05}s`;
                
                const runNumber = run.incidentNumber || 'N/A';
                
                let reported = 'N/A';
                if (run.dispatchDate && run.dispatchTime) {
                    const formattedTime = enforce24HourTime(run.dispatchTime);
                    try {
                        const [y, m, d] = run.dispatchDate.split('-');
                        reported = `${m}/${d}/${y} ${formattedTime}`;
                    } catch(e) {
                        reported = `${run.dispatchDate} ${formattedTime}`;
                    }
                }

                let nature = run.callNature || 'N/A';
                const address = run.address || 'N/A';

                if (nature !== 'N/A' && emsNatures.includes(nature.toUpperCase())) {
                    nature = "EMS CALL";
                }

                card.innerHTML = `
                    <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-1 pb-1 border-b border-slate-700">
                        <div class="text-3xl font-semibold text-slate-400">
                            RUN #${runNumber}
                        </div>
                        <div class="text-3xl text-slate-400 mt-1 sm:mt-0">
                            ${reported}
                        </div>
                    </div>
                    <div class="w-full overflow-hidden">
                        <h3 class="text-4xl font-semibold text-red-500 mb-1">${nature}</h3>
                        <p class="text-3xl text-slate-300 truncate whitespace-nowrap block w-full">${address}</p>
                    </div>
                `;
                
                runsList.appendChild(card);
            });

            loadingMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            runsListContainer.style.display = 'block';
        }

        function showError(msg) {
            loadingMessage.style.display = 'none';
            errorText.textContent = msg;
            errorMessage.style.display = 'block';
        }
    </script>
</head>
<body class="bg-slate-900 min-h-screen antialiased text-slate-200">

    <div class="p-2">
        <header class="p-6 mb-6 bg-slate-800 rounded-lg shadow-lg">
            <h1 class="text-3xl sm:text-4xl font-bold text-slate-100">LAST 10 INCIDENTS</h1>
        </header>
        
        <div id="loading-message" class="bg-slate-800 rounded-xl shadow-lg p-6 text-center text-3xl text-slate-400 max-w-lg mx-auto">
            <svg class="animate-spin h-6 w-6 text-red-500 mx-auto mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Loading incident data...
        </div>

        <div id="error-message" class="hidden bg-slate-800 rounded-xl shadow-lg p-6 text-center text-red-400 max-w-lg mx-auto">
            <div class="flex items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-8 w-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
                </svg>
                <strong id="error-text" class="text-3xl">Could not load data.</strong>
            </div>
        </div>

        <div id="runs-list-container" class="hidden">
            <div id="runs-list" class="grid grid-cols-1 md:grid-flow-col md:grid-cols-2 md:grid-rows-5 gap-2">
                </div>
        </div>
        
    </div>
    
</body>
</html>
